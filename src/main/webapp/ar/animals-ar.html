<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishKids – AR: Animals</title>
    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Nunito', sans-serif; }
        #ar-ui {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.65); color: #fff;
            padding: 10px 20px; border-radius: 20px; font-size: 0.9rem;
            z-index: 999; text-align: center;
        }
        #back-btn {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #4FC3F7; color: #01579B; font-weight: 800;
            border: none; border-radius: 24px; padding: 12px 32px;
            font-size: 1rem; cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

<div id="ar-ui" role="status" aria-live="polite">
    📱 Apunta al marcador <strong>HIRO</strong> para ver el animal en 3D
</div>

<button id="back-btn" onclick="window.close()"
        aria-label="Cerrar realidad aumentada y volver">
    ← Volver
</button>

<!-- A-Frame + AR.js -->
<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    aria-label="Escena de realidad aumentada con animales en 3D">

    <!-- Marcador Hiro – muestra una figura de conejo 3D -->
    <a-marker preset="hiro">
        <!-- Si tienes modelos GLB, usar:
             <a-entity gltf-model="url(../models/rabbit.glb)" scale="0.5 0.5 0.5"></a-entity>
        -->
        <!-- Alternativa con primitivas A-Frame (siempre visible) -->
        <a-entity id="ar-animal" position="0 0.5 0">
            <!-- Cuerpo -->
            <a-sphere color="#F5F5F5" radius="0.4" position="0 0 0"
                      aria-label="Cuerpo del conejo"></a-sphere>
            <!-- Cabeza -->
            <a-sphere color="#F5F5F5" radius="0.28" position="0 0.55 0"></a-sphere>
            <!-- Orejas -->
            <a-cylinder color="#E8C4C4" height="0.5" radius="0.07" position="-0.12 1 0" rotation="0 0 -12"></a-cylinder>
            <a-cylinder color="#E8C4C4" height="0.5" radius="0.07" position="0.12 1 0" rotation="0 0 12"></a-cylinder>
            <!-- Ojos -->
            <a-sphere color="#E91E63" radius="0.04" position="-0.1 0.62 0.24"></a-sphere>
            <a-sphere color="#E91E63" radius="0.04" position="0.1 0.62 0.24"></a-sphere>
            <!-- Nariz -->
            <a-sphere color="#FF80AB" radius="0.03" position="0 0.56 0.26"></a-sphere>
            <!-- Cola -->
            <a-sphere color="#F5F5F5" radius="0.12" position="0 0 -0.45"></a-sphere>
        </a-entity>
    </a-marker>

    <!-- Texto flotante con nombre del animal -->
    <a-marker preset="hiro">
        <a-text value="RABBIT\nConejo" color="#0288D1"
                position="0 1.4 0" rotation="-90 0 0"
                align="center" width="2"
                aria-label="Nombre del animal: Rabbit (Conejo)">
        </a-text>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

</body>
</html>
